                                        <label className="text-sm font-medium text-gray-700 md:text-right pr-4 col-span-1">URL</label>
                                        <div className="col-span-3">
                                            <input type="url" defaultValue={link.url} className="w-full text-sm p-2 border border-gray-300 rounded-md shadow-sm" />
                                        </div>
                                    </div>
                                    <div className="md:col-span-1 text-center">
                                         <button type="button" onClick={() => removeLink(link.id)} className="text-gray-500 hover:text-red-600 p-2">
                                            <DeleteIcon />
                                        </button>
                                    </div>
                                </div>
                            ))}
                             <div className="pt-2">
                                <button type="button" onClick={addLink} className="flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                                    <PlusIcon /> Agregar enlace
                                </button>
                            </div>
                             <div className="mt-4 text-sm text-gray-600 flex items-center">
                                <AlertCircleIcon />
                                <span>Los cambios se verán reflejados <b>sólo al guardar</b> el soporte.</span>
                            </div>
                        </div>
                    </Card>
                );
            };
            
            const Actions = () => {
                return (
                    <div className="flex items-center space-x-4 pt-4">
                        <button type="submit" className="px-6 py-3 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                            Guardar cambios
                        </button>
                        <a href="#" className="px-6 py-3 border border-gray-300 rounded-md shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50">
                            Ver soporte
                        </a>
                        <a href="#" className="flex items-center px-6 py-3 border border-gray-300 rounded-md shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50">
                            <DeleteIcon />
                            <span className="ml-2">Eliminar soporte</span>
                        </a>
                    </div>
                );
            };
            
            const EditFormSidebar = ({ activeSection, setActiveSection, navItems }) => {
                const handleNavClick = (e, id) => {
                    e.preventDefault();
                    const element = document.getElementById(id);
                    if (element) {
                        // We use the main content area for scrolling, not window
                        const mainContent = document.querySelector('main');
                        if (mainContent) {
                            mainContent.scrollTo({
                                top: element.offsetTop - mainContent.offsetTop - 24, // 24px padding offset
                                behavior: 'smooth'
                            });
                        }
                    }
                };

                return (
                    <aside className="w-64 bg-transparent p-5 hidden lg:block sticky top-6 h-screen">
                        <div className="aside-header mb-4">
                            <span className="title text-lg font-bold text-gray-700">Navegación</span>
                        </div>
                        <nav>
                            <ul className="space-y-2">
                                {navItems.map(item => (
                                    <li key={item.id}>
                                        <a 
                                            href={`#${item.id}`} 
                                            onClick={(e) => handleNavClick(e, item.id)}
                                            className={`block px-4 py-2 text-sm rounded-md transition-colors duration-200 ${
                                                activeSection === item.id 
                                                ? 'bg-indigo-100 text-indigo-700 font-semibold' 
                                                : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'
                                            }`}
                                        >
                                            {item.label}
                                        </a>
                                    </li>
                                ))}
                            </ul>
                        </nav>
                    </aside>
                );
            };
            
            const [activeSection, setActiveSection] = useState('section-info');

            const navItems = [
                { id: 'section-info', label: 'Información general' },
                { id: 'section-sales', label: 'Precios' },
                { id: 'section-services', label: 'Servicios adicionales' },
                { id: 'section-loc', label: 'Ubicación' },
                { id: 'section-specs', label: 'Especificaciones' },
                { id: 'section-photos', label: 'Fotos' },
                { id: 'section-links', label: 'Enlaces' },
            ];

            useEffect(() => {
                const mainContent = document.querySelector('main');
                if (!mainContent) return;

                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                setActiveSection(entry.target.id);
                            }
                        });
                    },
                    {
                        root: mainContent,
                        rootMargin: "-25% 0px -75% 0px", // Active when in top 25% of viewport
                    }
                );

                const sections = navItems.map(item => document.getElementById(item.id));
                sections.forEach(section => {
                    if (section) observer.observe(section);
                });

                return () => sections.forEach(section => {
                    if (section) observer.unobserve(section);
                });
            }, []);

            return (
                <div className="flex">
                    <EditFormSidebar activeSection={activeSection} setActiveSection={setActiveSection} navItems={navItems} />
                    <div className="flex-1">
                        <form className="space-y-6">
                            <InfoSection 
                                isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled} 
                                providers={providers}
                                setProviders={setProviders}
                                isThirdParty={isThirdParty}
                                setIsThirdParty={setIsThirdParty}
                                isModalOpen={isModalOpen}
                                setIsModalOpen={setIsModalOpen}
                            />
                            <PricingSection />
                            <ServicesSection />
                            <LocationSection />
                            <SpecsSection />
                            <PhotosSection />
                            <LinksSection />
                            <Actions />
                        </form>
                    </div>
                </div>
            )
        };
        
        // --- COMPANY VIEW ---
        const CompanyView = ({ isThirdPartyFeatureEnabled, setIsThirdPartyFeatureEnabled }) => {
             const [activeSection, setActiveSection] = useState('section-info');
             const [localThirdPartyEnabled, setLocalThirdPartyEnabled] = useState(isThirdPartyFeatureEnabled);
             const [showSuccessChip, setShowSuccessChip] = useState(false);

             useEffect(() => {
                setLocalThirdPartyEnabled(isThirdPartyFeatureEnabled);
             }, [isThirdPartyFeatureEnabled]);

             const navItems = [
                { id: 'section-info', label: 'Información General' },
                { id: 'section-contact', label: 'Datos de contacto' },
                { id: 'section-description', label: 'Descripción' },
                { id: 'section-viewport', label: 'Vista de Mapas' },
                { id: 'section-sections', label: 'Módulos de Empresa' },
             ];
             
             const handleNavClick = (e, id) => {
                e.preventDefault();
                const element = document.getElementById(id);
                if (element) {
                    const mainContent = document.querySelector('main');
                    if (mainContent) {
                        mainContent.scrollTo({ top: element.offsetTop - mainContent.offsetTop - 70, behavior: 'smooth' });
                    }
                }
            };
            
            useEffect(() => {
                const mainContent = document.querySelector('main');
                if (!mainContent) return;

                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                setActiveSection(entry.target.id);
                            }
                        });
                    }, { root: mainContent, rootMargin: "-20% 0px -80% 0px" }
                );

                const sections = navItems.map(item => document.getElementById(item.id));
                sections.forEach(section => { if (section) observer.observe(section); });
                return () => sections.forEach(section => { if (section) observer.unobserve(section); });
            }, []);
            
            const [switches, setSwitches] = useState({
                email: false,
                hub: false,
                audience: false,
                tax: false,
                taxBreakdown: false,
                currency: false,
            });

            const handleSwitchChange = (key) => {
                setSwitches(prev => ({...prev, [key]: !prev[key]}));
            };

             const handleSubmit = (e) => {
                e.preventDefault();
                setIsThirdPartyFeatureEnabled(localThirdPartyEnabled);
                setShowSuccessChip(true);
                setTimeout(() => setShowSuccessChip(false), 3000);
             };

            const Switch = ({ label, id, checked, onChange, helpText }) => {
                return (
                    <tr className="border-b">
                        <td className="py-2 pr-2">
                             <label htmlFor={id} className="flex items-center cursor-pointer">
                                <div className="relative">
                                    <input type="checkbox" id={id} className="sr-only" checked={checked} onChange={onChange} />
                                    <div className={`block w-10 h-6 rounded-full transition-colors ${checked ? 'bg-indigo-600' : 'bg-gray-200'}`}></div>
                                    <div className={`dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${checked ? 'translate-x-full' : ''}`}></div>
                                </div>
                            </label>
                        </td>
                        <td className="py-2 text-sm text-gray-700 align-middle">
                            {label}
                        </td>
                    </tr>
                );
            };

             return (
                 <div className="flex">
                    <aside className="w-56 bg-white p-4 shadow-sm hidden lg:block sticky top-6 h-[calc(100vh-5rem)] rounded-lg border">
                         <h3 className="text-lg font-bold text-gray-800 mb-4">Navegación</h3>
                         <ul className="space-y-1">
                            {navItems.map(item => (
                                <li key={item.id}>
                                    <a href={`#${item.id}`} onClick={(e) => handleNavClick(e, item.id)} className={`block px-3 py-2 text-sm rounded-md ${activeSection === item.id ? 'bg-indigo-100 text-indigo-700 font-semibold' : 'text-gray-600 hover:bg-gray-100'}`}>
                                        {item.label}
                                    </a>
                                </li>
                            ))}
                         </ul>
                    </aside>
                    <div className="flex-1 lg:pl-6">
                        <form className="space-y-6" onSubmit={handleSubmit}>
                           <div id="section-info" className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                <div className="p-4 border-b"><h2 className="text-lg font-semibold text-gray-800">Información General</h2></div>
                                <div className="p-6">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="space-y-6">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Logo</label>
                                                <div className="flex items-center gap-4">
                                                    <img alt="Logo" className="h-16 border p-1 rounded" src="https://oohmanager-staging.s3.amazonaws.com/uploads/admin/tenant/thumb_logo_63af7da71d93261e.png" />
                                                    <div>
                                                        <button className="px-3 py-1.5 text-sm border rounded-md">Reemplazar</button>
                                                        <div className="mt-1"><input type="checkbox" id="remove_logo" /><label htmlFor="remove_logo" className="ml-1 text-sm">Eliminar</label></div>
                                                    </div>
                                                </div>
                                                <p className="text-xs text-gray-500 mt-2">Tamaño máx. 10 MB. Imagen en relación 3:1 (Ej: 540x180px).</p>
                                            </div>
                                             <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Favicon</label>
                                                <div className="flex items-center gap-4">
                                                     <div className="w-10 h-10 bg-gray-300 flex items-center justify-center text-white text-xs rounded border">1:1</div>
                                                     <button className="px-3 py-1.5 text-sm border rounded-md">Subir Favicon</button>
                                                 </div>
                                                 <p className="text-xs text-gray-500 mt-2">Tamaño máx. 10 MB. Imagen 1:1 (Ej: 40x40px). Tipo: .ico</p>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <FormInput label="Nombre empresa" id="company_name" defaultValue="Administración" required />
                                            <FormSelect label="País" id="country" disabled><option>Chile</option></FormSelect>
                                            <FormSelect label="Idioma" id="language"><option>Español</option><option>English</option></FormSelect>
                                            <h4 className="text-sm font-bold pt-2">Opciones de empresa</h4>
                                            <table className="w-full">
                                                <tbody>
                                                    <Switch label="Notificaciones por correo" id="switch_email" checked={switches.email} onChange={() => handleSwitchChange('email')} />
                                                    <Switch label="Compartir inventario con OOH Publicidad" id="switch_hub" checked={switches.hub} onChange={() => handleSwitchChange('hub')} />
                                                    <Switch label="Medición de audiencia" id="switch_audience" checked={switches.audience} onChange={() => handleSwitchChange('audience')} />
                                                    <Switch label="Ocultar IVA" id="switch_tax" checked={switches.tax} onChange={() => handleSwitchChange('tax')} />
                                                    <Switch label="Opción exportar con detalle impuesto" id="switch_tax_breakdown" checked={switches.taxBreakdown} onChange={() => handleSwitchChange('taxBreakdown')} />
                                                    <Switch label="Elegir moneda al exportar fichas" id="switch_currency" checked={switches.currency} onChange={() => handleSwitchChange('currency')} />
                                                    <Switch 
                                                        label="Soportes de tercero" 
                                                        id="switch_third_party_supports" 
                                                        checked={localThirdPartyEnabled} 
                                                        onChange={() => setLocalThirdPartyEnabled(prev => !prev)} 
                                                    />
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                           </div>

                           <div id="section-contact" className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                <div className="p-4 border-b"><h2 className="text-lg font-semibold text-gray-800">Datos de contacto</h2></div>
                                <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <FormInput label="Dirección" id="contact_address" />
                                    <FormInput label="Teléfono" id="contact_phone" />
                                    <FormInput label="Correo electrónico" id="contact_email" type="email" />
                                </div>
                            </div>

                            <div id="section-description" className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                <div className="p-4 border-b"><h2 className="text-lg font-semibold text-gray-800">Descripción</h2></div>
                                <div className="p-6">
                                    <p className="text-sm text-gray-600 mb-2">Ingrese aquí información acerca de su empresa (Ej: Quiénes somos, etc.)</p>
                                    <div className="border rounded-md">
                                        <div className="p-2 border-b bg-gray-50 text-xs text-gray-500">Simulación de Toolbar</div>
                                        <textarea className="w-full h-32 p-2 border-0 focus:ring-0" placeholder="Escribe aquí..."></textarea>
                                    </div>
                                    <p className="text-xs text-gray-500 mt-2">El contenido de este campo será incluido en las cotizaciones.</p>
                                </div>
                            </div>
                            
                           <div id="section-viewport" className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                <div className="p-4 border-b"><h2 className="text-lg font-semibold text-gray-800">Vista de Mapas</h2></div>
                                <div className="p-6 space-y-4">
                                     <FormInput id="map_address" placeholder="Ingresa una ciudad o comuna" />
                                     <div className="w-full h-80 bg-gray-300 rounded-lg flex items-center justify-center border"><p className="text-gray-500">Simulación de Mapa</p></div>
                                     <p className="text-xs text-gray-500">Esta visualización determinará la ubicación por defecto de todos los mapas.</p>
                                </div>
                           </div>
                           
                           <div id="section-sections" className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                <div className="p-4 border-b"><h2 className="text-lg font-semibold text-gray-800">Módulos de Empresa</h2></div>
                                <div className="p-6 space-y-2">
                                    <label className="flex items-center"><input type="checkbox" className="h-4 w-4" defaultChecked /> <span className="ml-2 text-sm">Módulo Comercial</span></label>
                                    <label className="flex items-center"><input type="checkbox" className="h-4 w-4" /> <span className="ml-2 text-sm">Módulo de Operaciones</span></label>
                                    <label className="flex items-center"><input type="checkbox" className="h-4 w-4" /> <span className="ml-2 text-sm">Módulo de Ubicaciones</span></label>
                                </div>
                           </div>
                           
                           <button type="submit" className="px-5 py-2.5 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700">Guardar cambios</button>
                        </form>
                    </div>
                    <SuccessChip message="¡Cambios guardados con éxito!" show={showSuccessChip} />
                 </div>
             );
        };
        
        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [view, setView] = useState('catalog'); // 'catalog', 'map', 'edit', 'company'
            const [selectedSupport, setSelectedSupport] = useState(null);
            const [isThirdPartyFeatureEnabled, setIsThirdPartyFeatureEnabled] = useState(false);
            const [globalProviders, setGlobalProviders] = useState(['Proveedor A', 'Proveedor B', 'Proveedor C']);

            const handleNavigate = (newView) => {
                setView(newView);
                if (newView !== 'edit') {
                    setSelectedSupport(null);
                }
            };
            
            const handleEdit = (support) => {
                setSelectedSupport(support);
                setView('edit');
            };

            const renderContent = () => {
                switch(view) {
                    case 'catalog':
                        return <CatalogView 
                                    onEdit={handleEdit} 
                                    isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled}
                                    providers={globalProviders} 
                                />;
                    case 'map':
                        return <MapView isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled} providers={globalProviders} />;
                    case 'edit':
                        return <EditSupportView 
                                    support={selectedSupport} 
                                    isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled}
                                    providers={globalProviders}
                                    setProviders={setGlobalProviders}
                                />;
                    case 'company':
                        return <CompanyView 
                                    isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled} 
                                    setIsThirdPartyFeatureEnabled={setIsThirdPartyFeatureEnabled} 
                                />;
                    default:
                        return <CatalogView 
                                    onEdit={handleEdit}
                                    isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled}
                                    providers={globalProviders} 
                                />;
                }
            };

            return (
                <div className="flex h-screen bg-gray-100 font-sans">
                    <MainSidebar onNavigate={handleNavigate} currentView={view} />
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <Header view={view} support={selectedSupport} onNavigate={handleNavigate} />
                        <main className="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                           {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
