        const CloseIcon = () => ( <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /> </svg> );
        const PencilIcon = () => ( <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"> <path d="M13.586 3.586a2 2 0 112.828 2.828l-1.414 1.414-2.828-2.828 1.414-1.414zM11.086 6.086L3 14.172V17h2.828l8.086-8.086-2.828-2.828z" /> </svg> );
        const CheckIcon = () => ( <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"> <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" /> </svg> );
        const SmallCloseIcon = () => ( <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"> <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" /> </svg> );
        const InfoIcon = () => ( <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-blue-500" viewBox="0 0 20 20" fill="currentColor"> <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" /> </svg> );
        const ConfigIcon = ({ className }) => (<svg className={className || "h-5 w-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>);

        
        // --- MOCK DATA ---
        const mockSupportData = [
            { id: 5522, code: 'T-001', type: 'Mobiliario Urbano Impreso - Otros', name: 'Soporte 001 Valla - Concepción 2', minPrice: '$ 1.806.483', monthlyPrice: '$ 2.000.000', cpi: '$ 4,00', comuna: 'Vitacura', address: 'Av. Vitacura 2939', region: 'Metropolitana de Santiago', lat: -33.4143, lng: -70.6033 },
            { id: 5523, code: 'T-002', type: 'Valla', name: 'Soporte 002 Valla - Renca', minPrice: '$ 1.800.000', monthlyPrice: '$ 2.000.000', cpi: '$ 4,00', comuna: 'Renca', address: 'Av. Kennedy 9001', region: 'Metropolitana de Santiago', lat: -33.399, lng: -70.55 },
            { id: 5524, code: 'T-003', type: 'Caminero', name: 'Soporte 003 Caminero - Tiltil', minPrice: '$ 1.700.000', monthlyPrice: '$ 2.000.000', cpi: '$ 4,00', comuna: 'Tiltil', address: 'Ruta 5 Norte km 45', region: 'Metropolitana de Santiago', lat: -33.08, lng: -70.93 },
            { id: 5525, code: 'T-004', type: 'Valla', name: 'Soporte 004 Valla - Renca', minPrice: '$ 1.600.000', monthlyPrice: '$ 1.800.000', cpi: '$ 3,60', comuna: 'Renca', address: 'Av. Américo Vespucio 1501', region: 'Metropolitana de Santiago', lat: -33.41, lng: -70.74 },
            { id: 5526, code: 'T-005', type: 'Mobiliario Urbano Impreso - Otros', name: 'Soporte 005 Mobiliario Urbano Impreso - Otros - Arica', minPrice: '$ 1.400.000', monthlyPrice: '$ 1.500.000', cpi: '$ 3,00', comuna: 'Arica', address: 'Diego Portales 545', region: 'Arica y Parinacota', lat: -18.47, lng: -70.31 },
        ];
        
        // --- SHARED COMPONENTS ---
        const SuccessChip = ({ message, show }) => {
            if (!show) return null;

            return (
                <div className="fixed bottom-6 right-6 z-50 bg-gray-800 text-white py-2.5 px-5 rounded-lg shadow-xl flex items-center animate-fade-in-out">
                    <CheckIcon />
                    <span className="ml-2 font-medium text-sm">{message}</span>
                </div>
            );
        };
        
        const FormInput = ({ label, id, helpText, children, labelClass, wrapperClass, ...props }) => (
            <div className={wrapperClass}>
                {label && (
                    <label htmlFor={id} className={`flex items-center text-sm font-medium text-gray-700 mb-1 ${labelClass}`}>
                        <span>{label}</span>
                        {helpText && <span className="ml-1 text-gray-400 cursor-help" title={helpText}><HelpIcon className="h-4 w-4" /></span>}
                    </label>
                )}
                <div className="filter-container">
                    {children ? children : <input id={id} {...props} className="w-full h-[34px] px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" />}
                </div>
            </div>
        );

        const FormSelect = ({ label, id, children, helpText, labelClass, wrapperClass, ...props }) => (
             <div className={wrapperClass}>
                {label && (
                    <label htmlFor={id} className={`flex items-center text-sm font-medium text-gray-700 mb-1 ${labelClass}`}>
                       <span>{label}</span>
                       {helpText && helpText}
                    </label>
                )}
                <div className="filter-container">
                    <select id={id} {...props} className={props.className || "w-full pl-3 pr-10 py-1.5 text-sm border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 rounded-md h-[34px]"}>
                        {children}
                    </select>
                </div>
            </div>
        );
        
        const NavItem = ({ icon, children, href = "#", active = false, hasSubmenu = false, open = false, onClick }) => {
            const linkClasses = `flex items-center p-3 my-1 rounded-md transition-colors duration-200 ${ active ? 'bg-slate-700 text-white' : 'text-gray-300 hover:bg-slate-700 hover:text-white'}`;
            return ( <li> <a href={href} className={linkClasses} onClick={onClick}> {icon} <span className="mx-4 font-medium">{children}</span> {hasSubmenu && <ChevronDownIcon className={`ml-auto h-5 w-5 transition-transform duration-300 ${open ? 'rotate-180' : ''}`} />} </a> </li> );
        };

        const SubMenu = ({ children, open }) => ( <div className={`overflow-hidden transition-all duration-300 ease-in-out ${open ? 'max-h-screen' : 'max-h-0'}`}> <ul className="pl-8 py-1">{children}</ul> </div> );
        
        const SubMenuItem = ({ children, href="#", active = false, onClick }) => ( <li> <a href={href} onClick={onClick} className={`block p-2 text-sm rounded-md ${ active ? 'text-white font-semibold' : 'text-gray-400 hover:bg-slate-700 hover:text-white'}`}> {children} </a> </li> );

        const MainSidebar = ({ onNavigate, currentView }) => {
            const [openMenu, setOpenMenu] = useState('soportes');
            const toggleMenu = (menu) => setOpenMenu(openMenu === menu ? null : menu);
            
            const handleNav = (e, view) => {
                e.preventDefault();
                onNavigate(view);
            };

            return (
                <aside className="hidden md:flex flex-col w-64 bg-slate-800 text-white overflow-y-auto">
                    <div className="flex items-center justify-between h-16 px-6 bg-slate-900">
                        <span className="text-2xl font-semibold">OOH</span>
                        <button className="text-gray-300 hover:text-white"> <MenuIcon /> </button>
                    </div>
                    <nav className="flex-1 px-4 py-4">
                        <p className="px-3 text-xs uppercase text-gray-400 tracking-wider">Menú</p>
                        <ul>
                            <NavItem icon={<HomeIcon className="h-5 w-5"/>} href="#">Inicio</NavItem>
                            <NavItem icon={<WidgetsIcon className="h-5 w-5"/>} hasSubmenu open={openMenu === 'soportes'} onClick={(e) => { e.preventDefault(); toggleMenu('soportes'); }}>Soportes</NavItem>
                            <SubMenu open={openMenu === 'soportes'}>
                                <SubMenuItem active={currentView === 'catalog' || currentView === 'edit'} onClick={(e) => handleNav(e, 'catalog')}>Catálogo</SubMenuItem>
                                <SubMenuItem>Disponibilidad</SubMenuItem>
                                <SubMenuItem active={currentView === 'map'} onClick={(e) => handleNav(e, 'map')}>Mapa</SubMenuItem>
                            </SubMenu>
                            <NavItem icon={<AssignmentIcon className="h-5 w-5"/>}>Cotizaciones</NavItem>
                            <NavItem icon={<CalendarIcon className="h-5 w-5"/>}>Reservas</NavItem>
                            <NavItem icon={<AssignmentCheckIcon className="h-5 w-5"/>}>Campañas</NavItem>
                            <NavItem icon={<CogIcon className="h-5 w-5" />} hasSubmenu open={openMenu === 'admin'} onClick={(e) => { e.preventDefault(); toggleMenu('admin'); }}>Admin</NavItem>
                            <SubMenu open={openMenu === 'admin'}>
                                <SubMenuItem active={currentView === 'company'} onClick={(e) => handleNav(e, 'company')}>Empresa</SubMenuItem>
                            </SubMenu>
                        </ul>
                    </nav>
                </aside>
            );
        };
        
        const Header = ({ view, support, onNavigate }) => {
            const Breadcrumb = () => {
                return (
                    <div className="flex items-center text-sm text-gray-500">
                        <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }} className="hover:text-gray-700"><HomeIcon className="h-5 w-5"/></a>
                        <ChevronRightIcon className="h-5 w-5 mx-1" />
                        
                        {view === 'catalog' && <><a href="#" onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }} className="hover:text-gray-700">Soportes</a><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">Catálogo</span></>}
                        {view === 'map' && <><a href="#" onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }} className="hover:text-gray-700">Soportes</a><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">Mapa</span></>}
                        {view === 'company' && <><a href="#" onClick={(e) => { e.preventDefault(); onNavigate('company'); }} className="hover:text-gray-700">Admin</a><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">Empresa</span></>}
                        
                        {view === 'edit' && (
                            <Fragment>
                                <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }} className="hover:text-gray-700">Soportes</a>
                                <ChevronRightIcon className="h-5 w-5 mx-1" />
                                <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }} className="hover:text-gray-700">Catálogo</a>
                                <ChevronRightIcon className="h-5 w-5 mx-1" />
                                <span className="font-medium text-gray-800">Editar Soporte {support?.code}</span>
                            </Fragment>
                        )}
                    </div>
                );
            };
            return (
                <header className="flex items-center justify-between h-16 px-6 bg-white border-b border-gray-200">
                    <div className="flex items-center">
                        <button className="md:hidden text-gray-500 focus:outline-none focus:text-gray-700"><MenuIcon className="h-6 w-6"/></button>
                        <Breadcrumb />
                    </div>
                </header>
            );
        };

        const OwnershipFilter = ({ providers }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [activeParent, setActiveParent] = useState('todas');
            const [selectedProviders, setSelectedProviders] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [dropdownRef]);
            
            const handleParentChange = (parent) => {
                setActiveParent(parent);
                if (parent !== 'terceros') {
                    setSelectedProviders({});
                }
            };

            const handleProviderChange = (e) => {
                const { value, checked } = e.target;
                setActiveParent('terceros');
                setSelectedProviders(prev => ({
                    ...prev,
                    [value]: checked
                }));
            };

            const getTriggerLabel = () => {
                if (activeParent === 'todas') return 'Todas';
                if (activeParent === 'propios') return 'Propios';
                if (activeParent === 'terceros') {
                    const checkedProviders = Object.keys(selectedProviders).filter(p => selectedProviders[p]);
                    if (checkedProviders.length === 0) return 'Terceros';
                    if (checkedProviders.length === 1) return checkedProviders[0];
                    return `${checkedProviders.length} proveedores`;
                }
                return 'Seleccionar opciones';
            };

            const getTooltipText = () => {
                if (activeParent === 'terceros') {
                    const checkedProviders = Object.keys(selectedProviders).filter(p => selectedProviders[p]);
                    if (checkedProviders.length > 1) {
                        return checkedProviders.join(', ');
                    }
                }
                return null;
            };

            const labelText = getTriggerLabel();
            const tooltipText = getTooltipText();
            const showProviders = activeParent === 'terceros';
            const filteredProviders = providers.filter(p => p.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                 <div className="relative w-full group" ref={dropdownRef}>
                    <button 
                        type="button"
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full h-[34px] flex items-center justify-between bg-white border border-gray-300 rounded-md px-3 py-1.5 text-sm shadow-sm hover:border-gray-400 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
                    >
                        <span className={`truncate ${labelText === 'Seleccionar opciones' ? 'text-gray-400' : 'text-gray-800'}`}>{labelText}</span>
                        <ChevronDownIcon className={`h-5 w-5 text-gray-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {tooltipText && (
                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-max max-w-xs p-2 px-3 bg-gray-800 text-white text-xs font-medium leading-snug rounded shadow-lg z-50 text-center pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <span>{tooltipText}</span>
                            <div className="absolute left-1/2 -translate-x-1/2 top-full border-4 border-transparent border-t-gray-800"></div>
                        </div>
                    )}

                    <div className={`ownership-dropdown-menu absolute left-0 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-xl z-10 p-2 ${isOpen ? 'show' : ''}`}>
                        <div className="space-y-1">
                             <div className="flex items-center space-x-3 p-1 hover:bg-gray-50 rounded-md transition-colors">
                                <input type="checkbox" id="chk-todas" checked={activeParent === 'todas'} onChange={() => handleParentChange('todas')} className="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer" />
                                <label htmlFor="chk-todas" className="text-sm font-medium text-gray-700 cursor-pointer select-none flex-1">Todas</label>
                            </div>
                            <div className="flex items-center space-x-3 p-1 hover:bg-gray-50 rounded-md transition-colors">
                                <input type="checkbox" id="chk-propios" checked={activeParent === 'propios'} onChange={() => handleParentChange('propios')} className="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer" />
                                <label htmlFor="chk-propios" className="text-sm font-medium text-gray-700 cursor-pointer select-none flex-1">Propios</label>
                            </div>
                            <div>
                                <div className="flex items-center space-x-3 p-1 hover:bg-gray-50 rounded-md transition-colors">
                                    <input type="checkbox" id="chk-terceros" checked={activeParent === 'terceros'} onChange={() => handleParentChange('terceros')} className="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer" />
                                    <label htmlFor="chk-terceros" className="text-sm font-medium text-gray-700 cursor-pointer select-none flex-1">Terceros</label>
                                </div>
                                <div className={`cascade-section ml-6 pl-4 border-l-2 border-blue-100 space-y-2 ${showProviders ? 'open' : ''}`}>
                                    <div className="relative">
                                        <input 
                                            type="text" 
                                            placeholder="Buscar proveedor..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full text-sm p-1.5 border border-gray-200 rounded-md shadow-sm mb-2" 
                                        />
                                    </div>
                                    <div className="max-h-24 overflow-y-auto pr-2">
                                        {filteredProviders.map(provider => (
                                            <div key={provider} className="flex items-center space-x-3 py-1">
                                                <input type="checkbox" id={`prov-${provider}`} value={provider} checked={!!selectedProviders[provider]} onChange={handleProviderChange} className="w-3.5 h-3.5 text-blue-500 border-gray-300 rounded cursor-pointer" />
                                                <label htmlFor={`prov-${provider}`} className="text-sm text-gray-600 cursor-pointer select-none">{provider}</label>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // --- CATALOG VIEW ---
        const CodeFilter = ({ isThirdPartyFeatureEnabled }) => {
            const [isConfigOpen, setIsConfigOpen] = useState(false);
            const [searchType, setSearchType] = useState('exacto');
            const [searchProviderCode, setSearchProviderCode] = useState(false);
            const configRef = useRef(null);

            useEffect(() => {
                if (!isThirdPartyFeatureEnabled) {
                    setSearchProviderCode(false);
                }
            }, [isThirdPartyFeatureEnabled]);


            const isDefault = searchType === 'exacto' && !searchProviderCode;

            const toggleConfig = (e) => {
                e.stopPropagation();
                setIsConfigOpen(prev => !prev);
            };
            
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (configRef.current && !configRef.current.contains(event.target)) {
                        setIsConfigOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                };
            }, []);

            let tooltipText = "Búsqueda: ";
            const activeFilters = [];
            if (searchType === 'exacto') activeFilters.push("Exacta");
            else activeFilters.push("Parcial");
            if (searchProviderCode && isThirdPartyFeatureEnabled) activeFilters.push("Proveedor");
            tooltipText += activeFilters.join(" + ");

            return (
                <div className="relative w-full" ref={configRef}>
                    <div className="relative flex items-center">
                        <input type="text" placeholder="Ej: 220 LI 80" className="w-full h-[34px] border border-gray-300 rounded-md text-sm px-3 py-1.5 text-gray-700 placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors pr-10 shadow-sm" />
                        <button type="button" onClick={toggleConfig} className="absolute inset-y-0 right-0 flex items-center px-3 focus:outline-none group">
                            <ConfigIcon className={`w-5 h-5 group-hover:text-blue-600 transition-colors ${isDefault ? 'text-gray-400' : 'text-blue-600'}`} />
                             <div className="absolute bottom-full right-0 mb-2 hidden group-hover:block w-max p-2 px-3 bg-gray-800 text-white text-xs font-medium leading-snug rounded shadow-lg z-50 text-center pointer-events-none whitespace-nowrap">
                                <span>{tooltipText}</span>
                                <div className="absolute right-3.5 top-full border-4 border-transparent border-t-gray-800"></div>
                            </div>
                        </button>
                    </div>

                    {isConfigOpen && (
                        <div className="absolute top-full mt-2 left-0 w-72 bg-white border border-gray-200 shadow-xl rounded-md z-50 p-4 animate-fade-in">
                            <h4 className="text-xs font-bold text-gray-800 mb-4 uppercase tracking-wide border-b border-gray-100 pb-2">Configuración</h4>
                            <div className="mb-4">
                                <span className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-2.5">Tipo de búsqueda</span>
                                <div className="flex items-center gap-6">
                                    <div className="flex items-center gap-1.5">
                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                            <input type="radio" name="tipo_codigo" value="exacto" checked={searchType === 'exacto'} onChange={() => setSearchType('exacto')} className="text-indigo-600 focus:ring-indigo-500 w-4 h-4 cursor-pointer" />
                                            <span className="text-sm font-semibold text-gray-600">Exacta</span>
                                        </label>
                                        <div className="relative flex items-center group">
                                            <InfoOutlineIcon className="w-4 h-4 text-gray-400 cursor-help group-hover:text-gray-600" />
                                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 p-2 bg-gray-800 text-white text-xs leading-snug rounded shadow-lg z-50 text-center pointer-events-none">
                                                Busca el código idéntico al ingresado.
                                                <div className="absolute left-1/2 -translate-x-1/2 top-full border-4 border-transparent border-t-gray-800"></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-1.5">
                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                            <input type="radio" name="tipo_codigo" value="parcial" checked={searchType === 'parcial'} onChange={() => setSearchType('parcial')} className="text-indigo-600 focus:ring-indigo-500 w-4 h-4 cursor-pointer" />
                                            <span className="text-sm font-semibold text-gray-600">Parcial</span>
                                        </label>
                                        <div className="relative flex items-center group">
                                            <InfoOutlineIcon className="w-4 h-4 text-gray-400 cursor-help group-hover:text-gray-600" />
                                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-52 p-2 bg-gray-800 text-white text-xs leading-snug rounded shadow-lg z-50 text-center pointer-events-none">
                                                Busca códigos que incluyan el texto ingresado.
                                                <div className="absolute left-1/2 -translate-x-1/2 top-full border-4 border-transparent border-t-gray-800"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {isThirdPartyFeatureEnabled && (
                                <React.Fragment>
                                    <div className="h-px bg-gray-100 w-full my-3"></div>
                                    <div className="pt-1">
                                        <div className="flex items-center gap-1.5">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" checked={searchProviderCode} onChange={(e) => setSearchProviderCode(e.target.checked)} className="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 cursor-pointer" />
                                                <span className="text-sm font-semibold text-gray-600">Código de proveedor</span>
                                            </label>
                                             <div className="relative flex items-center group">
                                                <InfoOutlineIcon className="w-4 h-4 text-gray-400 cursor-help group-hover:text-gray-600" />
                                                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-64 p-2 bg-gray-800 text-white text-xs leading-snug rounded shadow-lg z-50 text-center pointer-events-none">
                                                    Busca por el código del proveedor ingresado en la ficha del soporte.
                                                    <div className="absolute left-1/2 -translate-x-1/2 top-full border-4 border-transparent border-t-gray-800"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}
                            <div className="mt-5 flex justify-end">
                                <button type="button" onClick={(e) => { e.stopPropagation(); setIsConfigOpen(false); }} className="text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors px-4 py-1.5 rounded shadow-sm">Listo</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CatalogView = ({ onEdit, isThirdPartyFeatureEnabled, providers }) => {
            const [showMoreFilters, setShowMoreFilters] = useState(false);
            return (
                <div className="bg-white border border-gray-200 rounded-lg shadow-sm">
                    <div className="p-6">
                        <div className="space-y-4">
                            {/* Row 1 */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-4">
                                <FormInput wrapperClass="lg:col-span-2" label="Código" id="code" helpText="Puedes ingresar más de una fracción de código, separándolos por un espacio.">
                                    <CodeFilter isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled} />
                                </FormInput>
                                <FormInput wrapperClass="lg:col-span-3" label="Buscar por término" id="term" placeholder="Ej: nombre, ubicación" helpText="Búsqueda parcial por: nombre de soporte, dirección, etc." />
                                <FormInput wrapperClass="lg:col-span-3" label="Cercano a..." id="near">
                                    <div className="relative flex items-stretch w-full">
                                        <input placeholder="Dirección o establecimiento" className="w-full px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-l-md shadow-sm h-[34px]" />
                                        <button className="-ml-px relative inline-flex items-center px-2 py-1.5 rounded-r-md border border-gray-300 bg-gray-100 text-gray-600 hover:bg-gray-200">
                                            <SmallCloseIcon className="h-4 w-4" />
                                        </button>
                                    </div>
                                </FormInput>
                                <FormInput wrapperClass="lg:col-span-4" label="Precio (mínimo)" id="price">
                                    <div className="flex space-x-2">
                                        <input className="w-full px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-md shadow-sm h-[34px]" placeholder="Desde" />
                                        <input className="w-full px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-md shadow-sm h-[34px]" placeholder="Hasta" />
                                    </div>
                                </FormInput>
                            </div>

                             {/* Row 2 */}
                             <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 items-end">
                               <FormInput wrapperClass="lg:col-span-4" label="Disponibilidad" id="availability">
                                   <div className="flex items-center space-x-2">
                                      <input className="w-full px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-md shadow-sm h-[34px]" placeholder="Desde" />
                                      <input className="w-full px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-md shadow-sm h-[34px]" placeholder="Hasta" />
                                      <div className="flex items-center whitespace-nowrap">
                                        <input id="partial" type="checkbox" className="h-4 w-4 rounded border-gray-300" />
                                        <label htmlFor="partial" className="ml-1.5 text-sm font-bold text-gray-500">Parcial</label>
                                      </div>
                                       <div className="flex items-center whitespace-nowrap">
                                        <input id="reserved" type="checkbox" className="h-4 w-4 rounded border-gray-300" disabled />
                                        <label htmlFor="reserved" className="ml-1.5 text-sm text-gray-400">Mostrar reservados</label>
                                      </div>
                                   </div>
                               </FormInput>
                               <FormSelect wrapperClass="lg:col-span-3" label="Tipo de soporte" id="support_type" helpText={<a href="#" className="ml-1 text-sm text-blue-600 font-bold">Ver clasificación</a>}>
                                   <option>Todos los Soportes</option>
                               </FormSelect>
                               <FormSelect wrapperClass="lg:col-span-2" label="Comuna" id="comuna"><option>Todo Chile</option></FormSelect>
                               <FormSelect wrapperClass="lg:col-span-2" label="Ordenar por" id="sort_by">
                                    <option>Código</option>
                                    <option>Última actualización</option>
                                    <option>Comuna (a-z)</option>
                                    <option>Tipo de soporte (a-z)</option>
                                    <option>Precio (menor a mayor)</option>
                                    <option>Precio (mayor a menor)</option>
                                </FormSelect>
                               <div className="lg:col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1 invisible">Filtrar</label>
                                    <button className="w-full h-[34px] flex justify-center items-center px-4 py-2 border border-transparent rounded-md shadow-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
                                        <SearchIcon className="h-5 w-5" />
                                    </button>
                               </div>
                             </div>

                             {showMoreFilters && (
                                <div className="space-y-4 pt-4 border-t">
                                    {/* More Filters Row 1 */}
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                        <FormSelect label="Región" id="region"><option>Todo Chile</option></FormSelect>
                                        <FormSelect label="Circuito" id="circuit"><option>Todos los circuitos</option></FormSelect>
                                        <FormSelect label="Ruta" id="route"><option>Todas las rutas</option></FormSelect>
                                    </div>
                                    {/* More Filters Row 2 */}
                                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
                                        <FormSelect label="Orientación" id="orientation"><option>Todas las orientaciones</option></FormSelect>
                                        <FormSelect label="Vista" id="view"><option>Todas las vistas</option></FormSelect>
                                        {isThirdPartyFeatureEnabled && (
                                            <FormInput wrapperClass="lg:col-span-1" label="Propiedad del soporte" id="ownership">
                                                <OwnershipFilter providers={providers} />
                                            </FormInput>
                                        )}
                                        <FormInput wrapperClass="lg:col-span-1" label="Dimensiones" id="dimensions">
                                            <div className="flex space-x-2">
                                                <input className="w-full h-[34px] px-3 py-1.5 text-sm border border-gray-300 rounded-md" placeholder="Ancho (mts)" />
                                                <input className="w-full h-[34px] px-3 py-1.5 text-sm border border-gray-300 rounded-md" placeholder="Alto (mts)" />
                                            </div>
                                        </FormInput>
                                         <FormInput wrapperClass="lg:col-span-1" label="Otros" id="others">
                                            <div className="flex items-center space-x-4 h-[34px]">
                                                <div className="flex items-center whitespace-nowrap">
                                                    <input id="no-photo" type="checkbox" className="h-4 w-4 rounded border-gray-300" />
                                                    <label htmlFor="no-photo" className="ml-1.5 text-sm text-gray-700">Sin fotografía</label>
                                                </div>
                                                <div className="flex items-center whitespace-nowrap">
                                                    <input id="no-coords" type="checkbox" className="h-4 w-4 rounded border-gray-300" />
                                                    <label htmlFor="no-coords" className="ml-1.5 text-sm text-gray-700">Sin coordenadas</label>
                                                </div>
                                            </div>
                                         </FormInput>
                                    </div>
                                </div>
                             )}
                        </div>
                        {/* Bottom Bar */}
                        <div className="flex justify-between items-center pt-4 border-t mt-4">
                            <button onClick={() => setShowMoreFilters(!showMoreFilters)} className="text-sm text-blue-600 hover:text-blue-800 flex items-center shrink-0">
                                {showMoreFilters ? <CaretUpIcon className="mr-1"/> : <ChevronDownIcon className="mr-1" />}
                                <span className="whitespace-nowrap underline">
                                {showMoreFilters ? 'Ver menos filtros' : 'Ver más filtros'}
                                </span>
                             </button>
                             <div className="flex items-center">
                                <span className="text-sm font-bold mr-2">Visualización</span>
                                <div className="inline-flex rounded-md shadow-sm">
                                    <button className="relative inline-flex items-center px-3 py-1.5 rounded-l-md border border-gray-300 bg-gray-800 text-white text-sm font-medium z-10">
                                        <ListIcon />
                                    </button>
                                    <button className="-ml-px relative inline-flex items-center px-3 py-1.5 rounded-r-md border border-gray-300 bg-white text-gray-600 hover:bg-gray-50 text-sm font-medium">
                                        <ModuleIcon />
                                    </button>
                                </div>
                             </div>
                        </div>
                        <hr className="my-6" />
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200 text-sm">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-6 py-3 text-left font-medium text-gray-500 uppercase">Código</th>
                                        <th className="px-6 py-3 text-left font-medium text-gray-500 uppercase">Tipo de soporte</th>
                                        <th className="px-6 py-3 text-left font-medium text-gray-500 uppercase">Nombre</th>
                                        <th className="px-6 py-3 text-left font-medium text-gray-500 uppercase">Precio mensual</th>
                                        <th className="px-6 py-3 text-left font-medium text-gray-500 uppercase">Comuna</th>
                                        <th className="relative px-6 py-3"><span className="sr-only">Actions</span></th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {mockSupportData.map((support) => (
                                        <tr key={support.id} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 whitespace-nowrap font-medium text-gray-900">{support.code}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-gray-500">{support.type}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-gray-500">{support.name}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-gray-500">{support.monthlyPrice}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-gray-500">{support.comuna}</td>
                                            <td className="px-6 py-4 whitespace-nowrap text-right font-medium">
                                                <div className="flex items-center space-x-3 text-gray-400">
                                                    <button className="hover:text-blue-600"><InfoOutlineIcon className="h-5 w-5"/></button>
                                                    <button onClick={() => onEdit(support)} className="hover:text-blue-600"><EditIcon className="h-5 w-5"/></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };
        
        // --- MAP VIEW ---
        const MapView = ({ isThirdPartyFeatureEnabled, providers }) => {
            const mapFilterData = [
                { id: '1', name: 'Letrero Publicitario', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/1/marker-letreros-publicitarios.png', children: [
                    { id: '7', name: 'Tótem' }, { id: '8', name: 'Monumental' }, { id: '9', name: 'Unipole' }, { id: '11', name: 'Valla' }, { id: '12', name: 'Caminero' }, { id: '18', name: 'Topsite' }, { id: '26', name: 'Building' }, { id: '102', name: 'Terracero' }, { id: '105', name: 'Letreros Publicitarios - Otros' }
                ]},
                { id: '2', name: 'Mobiliario Urbano', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/2/marker-mobiliario-urbano.png', children: [
                    { id: '206', name: 'Mobiliario Urbano Impreso - Otros' }, { id: '3403', name: 'Mobiliario Urbano Digital' }
                ]},
                { id: '3', name: 'Pantallas Digitales', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/3/marker-pantallas-led.png', children: [
                    { id: '301', name: 'Pantallas Digitales' }
                ]},
                { id: '4', name: 'Bus', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/4/marker-publicidad-en-buses.png', children: [
                    { id: '404', name: 'Bus - Luneta' }, { id: '409', name: 'Bus - Lateral' }
                ]},
                { id: '19', name: 'Metro', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/19/marker-metro.png', children: [
                    { id: '1906', name: 'Metro - Pantalla Digital' }, { id: '1907', name: 'Metro - Boletería' }, { id: '1908', name: 'Metro - Torniquete' }, { id: '1909', name: 'Metro - Otros' }
                ]},
                { id: '20', name: 'Centro Comercial', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/20/marker-mall.png', children: [
                    { id: '2001', name: 'Centro Comercial - Letrero Publicitario' }, { id: '2002', name: 'Centro Comercial - Pantalla Digital' }, { id: '2004', name: 'Centro Comercial - Paleta' }, { id: '2009', name: 'Centro Comercial - Otros' }
                ]},
                { id: '21', name: 'Aeropuerto', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/21/marker-aeropuerto.png', children: [
                    { id: '2101', name: 'Aeropuerto - Soporte Impreso' }, { id: '2103', name: 'Aeropuerto - Otros' }
                ]},
                { id: '22', name: 'Supermercado', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/22/marker-supermercado.png', children: [
                    { id: '2201', name: 'Supermercado - Soporte Impreso' }, { id: '2203', name: 'Supermercado - Otros' }
                ]},
                { id: '36', name: 'Cine', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/36/marker-cine.png', children: [
                    { id: '3601', name: 'Cine - Soporte Impreso' }
                ]},
                { id: '37', name: 'Indoor', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/37/marker-indoor.png', children: [
                    { id: '3701', name: 'Indoor - Soporte Impreso' }, { id: '7809', name: 'Indoor - Videowall' }, { id: '7810', name: 'Indoor - Mobiliario urbano digital' }
                ]},
                { id: '39', name: 'No tradicional', img: 'https://oohmanager-staging.s3.amazonaws.com/uploads/public/format/39/marker-no-tradicional.png', children: [
                    { id: '28', name: 'Walker' }, { id: '31', name: 'Bicicleta / Scooter' }
                ]}
            ];

            const [openCategories, setOpenCategories] = useState({});
            const [showMoreFilters, setShowMoreFilters] = useState(false);
            const [filters, setFilters] = useState(() => {
                const allFilters = { 'all': true };
                mapFilterData.forEach(cat => {
                    allFilters[cat.id] = true;
                    cat.children.forEach(child => {
                        allFilters[child.id] = true;
                    });
                });
                return allFilters;
            });

            const toggleCategory = (id) => {
                setOpenCategories(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const handleFilterChange = (e) => {
                const { id, checked, dataset } = e.target;
                
                setFilters(prev => {
                    const newFilters = { ...prev };
                    newFilters[id] = checked;

                    if (id === 'all') {
                        Object.keys(newFilters).forEach(key => {
                            newFilters[key] = checked;
                        });
                    } else if (dataset.isParent) {
                        const parentId = id;
                        const children = mapFilterData.find(c => c.id === parentId)?.children || [];
                        children.forEach(child => {
                            newFilters[child.id] = checked;
                        });
                    } else if (dataset.parentId) {
                        const parentId = dataset.parentId;
                        const children = mapFilterData.find(c => c.id === parentId)?.children || [];
                        const allChildrenChecked = children.every(child => newFilters[child.id] || (child.id === id && checked));
                        const someChildrenChecked = children.some(child => newFilters[child.id] || (child.id === id && checked));
                         if(checked) {
                            newFilters[parentId] = true;
                         } else if(!someChildrenChecked) {
                            newFilters[parentId] = false;
                         }
                    }
                    
                    const allParentsChecked = mapFilterData.every(cat => newFilters[cat.id]);
                    if(allParentsChecked) newFilters['all'] = true;
                    else newFilters['all'] = false;


                    return newFilters;
                });
            };
            
            const FilterItem = ({ item, isChild, parentId }) => {
                const isParent = !isChild;
                const hasChildren = item.children && item.children.length > 0;
                const isOpen = hasChildren && openCategories[item.id];

                return (
                    <div className={`${isChild ? 'pl-3 pr-1 py-1 bg-gray-50' : 'px-2 py-1'}`}>
                        <div className="flex items-center justify-between">
                            <label className="flex items-center space-x-2 cursor-pointer w-full">
                                <input 
                                    type="checkbox" 
                                    id={item.id} 
                                    checked={!!filters[item.id]}
                                    onChange={handleFilterChange}
                                    data-is-parent={isParent}
                                    data-parent-id={parentId}
                                    className="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                {item.img && <img src={item.img} className="h-8" />}
                                <span className={`text-xs ${isParent ? 'font-semibold text-gray-800' : 'text-gray-700'}`}>{item.name}</span>
                            </label>
                            {hasChildren && (
                                <button onClick={() => toggleCategory(item.id)} className="p-1 text-gray-500 hover:text-gray-700">
                                    <ChevronDownIcon className={`h-5 w-5 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                                </button>
                            )}
                        </div>
                        {isOpen && (
                            <div className="pl-4 border-l-2 border-blue-200 mt-1">
                                {item.children.map(child => <FilterItem key={child.id} item={child} isChild parentId={item.id} />)}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="relative h-[calc(100vh-8rem)]">
                    {/* Left Filter Panel */}
                    <div className="absolute top-4 left-4 z-10 w-80 bg-white rounded-lg shadow-lg border flex flex-col max-h-[calc(100%-2rem)]">
                        <div className="p-2 bg-blue-600 rounded-t-lg text-white">
                            <label className="flex items-center space-x-2 cursor-pointer w-full">
                                <input type="checkbox" id="all" checked={!!filters['all']} onChange={handleFilterChange} className="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                <span className="font-bold">Todos los soportes</span>
                            </label>
                        </div>
                        
                        <div className="overflow-y-auto max-h-60">
                            <div className="divide-y divide-gray-200">
                                {mapFilterData.map(cat => <FilterItem key={cat.id} item={cat} />)}
                            </div>
                        </div>

                        <div className="p-2 border-t mt-auto overflow-y-auto">
                            <div className="p-1">
                                <FormInput wrapperClass="w-full" label="Buscar por código/s" id="code" helpText="Puedes ingresar más de una fracción de código, separándolos por un espacio.">
                                    <CodeFilter isThirdPartyFeatureEnabled={isThirdPartyFeatureEnabled} />
                                </FormInput>
                            </div>

                            <div className="p-1 mt-2">
                                <label className="font-bold text-sm text-gray-700">Buscar por disponibilidad</label>
                                <div className="flex space-x-2 mt-1">
                                    <input type="text" placeholder="Fecha inicio" className="w-1/2 border border-gray-300 rounded-md text-xs p-2 text-center" />
                                    <input type="text" placeholder="Fecha fin" className="w-1/2 border border-gray-300 rounded-md text-xs p-2 text-center" />
                                     <button className="text-gray-400 hover:text-gray-600 p-1">
                                        <SmallCloseIcon />
                                    </button>
                                </div>
                            </div>

                            <div className="p-1 mt-2">
                                <label className="font-bold text-sm text-gray-700">Buscar por circuito</label>
                                <select className="w-full border border-gray-300 rounded-md text-xs p-2 mt-1">
                                    <option>Nombre o código</option>
                                </select>
                            </div>

                            <div className="divide-y mt-2">
                                <div className="px-2 py-1">
                                    <label className="flex items-center space-x-2 cursor-pointer">
                                        <input type="checkbox" className="h-4 w-4 rounded border-gray-300" />
                                        <span className="font-bold text-sm text-gray-700">Tráfico en vivo</span>
                                        <span title="Congestión vehicular en tiempo real. Verde:Bajo | Amarillo:Medio | Rojo:Alto"><HelpIcon className="h-4 w-4 text-gray-400" /></span>
                                    </label>
                                </div>
                                <div className="px-2 py-1">
                                    <label className="flex items-center space-x-2 cursor-pointer">
                                        <input type="checkbox" className="h-4 w-4 rounded border-gray-300" />
                                        <span className="font-bold text-sm text-gray-700">Transporte público</span>
                                        <span title="Muestra paraderos Transantiago y líneas de metro"><HelpIcon className="h-4 w-4 text-gray-400" /></span>
                                    </label>
                                </div>
                            </div>

                            {isThirdPartyFeatureEnabled && (
                                <div className="pt-2">
                                    <button onClick={() => setShowMoreFilters(!showMoreFilters)} className="text-sm text-blue-600 hover:text-blue-800 flex items-center w-full justify-start py-1">
                                        {showMoreFilters ? <CaretUpIcon className="h-4 w-4 mr-1"/> : <ChevronDownIcon className="h-4 w-4 mr-1" />}
                                        <span className="whitespace-nowrap underline">
                                            {showMoreFilters ? 'Ver menos filtros' : 'Ver más filtros'}
                                        </span>
                                    </button>
                                </div>
                            )}

                            {showMoreFilters && isThirdPartyFeatureEnabled && (
                                <div className="p-1 mt-2 border-t">
                                    <div className="p-1 mt-2">
                                        <FormInput wrapperClass="w-full" label="Propiedad del soporte" id="ownership">
                                            <OwnershipFilter providers={providers} />
                                        </FormInput>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="p-2 border-t">
                            <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                              Aplicar filtros
                            </button>
                        </div>
                    </div>
                    {/* Map Placeholder */}
                    <div className="w-full h-full bg-gray-300 rounded-lg flex items-center justify-center">
                        <p className="text-gray-500 text-2xl">Simulación de Mapa</p>
                    </div>
                </div>
            );
        };
        
        // --- EDIT SUPPORT VIEW (NEW) ---
        const EditSupportView = ({ support, isThirdPartyFeatureEnabled, providers, setProviders }) => {
            const [isThirdParty, setIsThirdParty] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // From: components/Card.tsx
            const Card = ({ id, title, children }) => (
                <div id={id} className="bg-white border border-indigo-200 rounded-lg shadow-sm">
                    <div className="px-6 py-4 border-b border-gray-200">
                        <h2 className="text-xl font-semibold text-gray-800">{title}</h2>
                    </div>
                    <div className="p-6">
                        {children}
                    </div>
                </div>
            );

            const ProviderModal = ({ isOpen, onClose, providers, setProviders }) => {
                if (!isOpen) return null;

                const [newProvider, setNewProvider] = useState('');
                const [editingProvider, setEditingProvider] = useState(null); // original name
                const [editedName, setEditedName] = useState(''); // new name
                const [searchTerm, setSearchTerm] = useState('');

                const handleAddProvider = (e) => {
                    e.preventDefault();
                    if (editingProvider) return;
                    if (newProvider.trim() && !providers.includes(newProvider.trim())) {
                        setProviders([...providers, newProvider.trim()]);
                        setNewProvider('');
                    }
                };

                const handleDeleteProvider = (providerToDelete) => {
                    setProviders(providers.filter(p => p !== providerToDelete));
                };

                const handleStartEdit = (provider) => {
                    setEditingProvider(provider);
                    setEditedName(provider);
                };

                const handleCancelEdit = () => {
                    setEditingProvider(null);
                    setEditedName('');
                };

                const handleSaveEdit = () => {
                    if (editedName.trim() && editedName.trim() !== editingProvider && !providers.includes(editedName.trim())) {
                        const updatedProviders = providers.map(p => (p === editingProvider ? editedName.trim() : p));
                        setProviders(updatedProviders);
                    }
                    handleCancelEdit();
                };

                const filteredProviders = providers.filter(provider => 
                    provider.toLowerCase().includes(searchTerm.toLowerCase())
                );

                const modalContent = (
                    <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4">
                        <div className="bg-white rounded-lg shadow-xl w-full max-w-md">
                            <div className="flex justify-between items-center p-4 border-b">
                                <h3 className="text-lg font-semibold text-gray-800">Administrar proveedores</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                                    <CloseIcon />
                                </button>
                            </div>
                            <div className="p-4 border-b">
                                <div className="relative">
                                    <span className="absolute inset-y-0 left-0 flex items-center pl-3">
                                        <SearchIcon className="h-5 w-5 text-gray-400" />
                                    </span>
                                    <input
                                        type="text"
                                        placeholder="Buscar proveedor..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="block w-full pl-10 pr-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                                    />
                                </div>
                            </div>
                            <div className="p-4 max-h-64 overflow-y-auto">
                                <ul className="space-y-2">
                                    {filteredProviders.map((provider) => (
                                        <li key={provider} className="flex justify-between items-center bg-gray-50 p-2 rounded">
                                            {editingProvider === provider ? (
                                                <div className="flex-grow flex items-center gap-2">
                                                    <input 
                                                        type="text"
                                                        value={editedName}
                                                        onChange={(e) => setEditedName(e.target.value)}
                                                        className="flex-grow block w-full px-2 py-1 bg-white border border-indigo-300 rounded-md shadow-sm sm:text-sm"
                                                        autoFocus
                                                    />
                                                    <button onClick={handleSaveEdit} className="text-green-600 hover:text-green-800 p-1">
                                                        <CheckIcon />
                                                    </button>
                                                    <button onClick={handleCancelEdit} className="text-gray-500 hover:text-gray-700 p-1">
                                                        <SmallCloseIcon />
                                                    </button>
                                                </div>
                                            ) : (
                                                <React.Fragment>
                                                    <span className="text-gray-700">{provider}</span>
                                                    <div className="flex items-center gap-2">
                                                        <button onClick={() => handleStartEdit(provider)} className="text-blue-500 hover:text-blue-700">
                                                            <PencilIcon />
                                                        </button>
                                                        <button onClick={() => handleDeleteProvider(provider)} className="text-red-500 hover:text-red-700">
                                                            <DeleteIcon />
                                                        </button>
                                                    </div>
                                                </React.Fragment>
                                            )}
                                        </li>
                                    ))}
                                    {filteredProviders.length === 0 && !editingProvider && (
                                        <p className="text-center text-gray-500">
                                            {searchTerm ? 'No se encontraron proveedores.' : 'No hay proveedores.'}
                                        </p>
                                    )}
                                </ul>
                            </div>
                            <div className="p-4 border-t">
                                <form onSubmit={handleAddProvider} className="flex gap-2">
                                    <input
                                        type="text"
                                        value={newProvider}
                                        onChange={(e) => setNewProvider(e.target.value)}
                                        placeholder="Nombre del nuevo proveedor"
                                        className="flex-grow block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm disabled:bg-gray-100"
                                        disabled={!!editingProvider}
                                    />
                                    <button type="submit" className="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300" disabled={!!editingProvider}>
                                        Agregar
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
                
                return ReactDOM.createPortal(modalContent, document.getElementById('modal-root'));
            };

            const InfoSection = ({ 
                isThirdPartyFeatureEnabled, providers, setProviders,
                isThirdParty, setIsThirdParty, isModalOpen, setIsModalOpen 
            }) => {
                return (
                    <React.Fragment>
                    <ProviderModal 
                        isOpen={isModalOpen} 
                        onClose={() => setIsModalOpen(false)}
                        providers={providers}
                        setProviders={setProviders}
                    />
                    <Card id="section-info" title="Información general">
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-x-6 gap-y-4">
                            <div className="form-group md:col-span-3">
                                <label htmlFor="item_serial" className="block text-sm font-medium text-gray-700">Código</label>
                                <input type="text" id="item_serial" defaultValue="T-001" required className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" />
                            </div>
                            <div className="form-group md:col-span-7">
                                <label htmlFor="item_name" className="block text-sm font-medium text-gray-700">Nombre</label>
                                <input type="text" id="item_name" defaultValue="Soporte 001 Valla - Concepción" required className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" />
                            </div>
                            <div className="form-group md:col-span-2">
                                <label htmlFor="item_scopesi_id" className="block text-sm font-medium text-gray-700">ID Scopesi</label>
                                <input type="text" id="item_scopesi_id" defaultValue="3973" className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" />
                            </div>
                            <div className="form-group md:col-span-8">
                                <label htmlFor="item_format_id" className="block text-sm font-medium text-gray-700">
                                    Tipo de soporte
                                    <a href="#" className="ml-2 text-sm text-indigo-600 hover:text-indigo-800 font-bold">Ver clasificación</a>
                                </label>
                                <select id="item_format_id" required className="mt-1 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
                                    <option>Mobiliario Urbano Impreso - Otros</option>
                                    <option>Aeropuerto - Soporte Impreso</option>
                                    <option>Letrero Publicitario</option>
                                </select>
                            </div>
                            <div className="form-group md:col-span-4">
                                <label htmlFor="item_max_slots" className="flex items-center text-sm font-medium text-gray-700">
                                    Máximo de unidades
                                    <span className="ml-2 cursor-help"><InfoIcon /></span>
                                </label>
                                 <div className="mt-1 flex rounded-md shadow-sm">
                                    <input type="number" id="item_max_slots" defaultValue="2" className="block w-full text-center px-3 py-2 bg-white border border-gray-300 rounded-l-md sm:text-sm" />
                                    <div className="relative flex items-center px-3 border border-l-0 border-gray-300 bg-gray-50 rounded-r-md">
                                        <input id="item_unlimited_slots" type="checkbox" className="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" disabled />
                                        <label htmlFor="item_unlimited_slots" className="ml-2 text-sm text-gray-500 font-bold">Ilimitado</label>
                                    </div>
                                </div>
                            </div>
                            <div className="form-group md:col-span-6">
                                <label htmlFor="item_notes" className="block text-sm font-medium text-gray-700">Información adicional soporte</label>
                                <textarea id="item_notes" rows={4} className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm sm:text-sm" defaultValue="Ubicado en Calle Concepción #2242"></textarea>
                            </div>
                            <div className="form-group md:col-span-6">
                                <label htmlFor="item_comments" className="block text-sm font-medium text-gray-700">Comentarios soporte (uso interno)</label>
                                <textarea id="item_comments" rows={4} className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm sm:text-sm"></textarea>
                            </div>
                            
                            {isThirdPartyFeatureEnabled && (
                                <div className="form-group md:col-span-12">
                                    <label htmlFor="third-party-switch" className="flex items-center cursor-pointer">
                                        <div className="relative">
                                            <input type="checkbox" id="third-party-switch" className="sr-only" checked={isThirdParty} onChange={() => setIsThirdParty(!isThirdParty)} />
                                            <div className={`block w-10 h-6 rounded-full transition-colors ${isThirdParty ? 'bg-indigo-600' : 'bg-gray-200'}`}></div>
                                            <div className={`dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${isThirdParty ? 'translate-x-full' : ''}`}></div>
                                        </div>
                                        <div className="ml-3 text-sm font-medium text-gray-900">
                                            Soporte de tercero
                                        </div>
                                    </label>
                                </div>
                            )}

                            {isThirdPartyFeatureEnabled && isThirdParty && (
                                <React.Fragment>
                                    <div className="form-group md:col-span-6">
                                        <label htmlFor="provider_name" className="block text-sm font-medium text-gray-700">Proveedor</label>
                                        <div className="mt-1 flex shadow-sm rounded-md">
                                            <div className="relative flex-grow">
                                                <select 
                                                    id="provider_name" 
                                                    className="block w-full pl-3 pr-10 py-2 text-base border border-r-0 border-gray-300 focus:z-10 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-l-md appearance-none"
                                                >
                                                    {providers.map(p => <option key={p}>{p}</option>)}
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                                    <ChevronDownIcon />
                                                </div>
                                            </div>
                                            <button 
                                                type="button" 
                                                onClick={() => setIsModalOpen(true)}
                                                className="-ml-px relative inline-flex items-center px-3 py-2 rounded-r-md border border-gray-300 bg-gray-50 text-gray-500 hover:bg-gray-100 focus:z-10 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
                                            >
                                                <CogIcon />
                                            </button>
                                        </div>
                                    </div>
                                    <div className="form-group md:col-span-6">
                                        <label htmlFor="provider_code" className="block text-sm font-medium text-gray-700">Código</label>
                                        <input type="text" id="provider_code" className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" />
                                    </div>
                                </React.Fragment>
                            )}
                            
                            <div className="form-group md:col-span-12">
