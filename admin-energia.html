<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager OOH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .ownership-dropdown-menu {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.2s ease;
        }
        .ownership-dropdown-menu.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        @keyframes fadeInOut {
          0% { opacity: 0; transform: translateY(20px); }
          10% { opacity: 1; transform: translateY(0); }
          90% { opacity: 1; transform: translateY(0); }
          100% { opacity: 0; transform: translateY(20px); }
        }
        .animate-fade-in-out {
          animation: fadeInOut 3s ease-in-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <div id="modal-root"></div>

        const CaretUpIcon = ({ className }) => ( <svg xmlns="http://www.w3.org/2000/svg" className={className || "h-5 w-5"} viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" clipRule="evenodd" /></svg> );

        const EditIcon = ({className}) => ( <svg xmlns="http://www.w3.org/2000/svg" className={className || "h-4 w-4"} viewBox="0 0 20 20" fill="currentColor"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z" /><path fillRule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clipRule="evenodd" /></svg> );

        const PowerButtonIcon = ({className}) => ( <svg className={className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"> <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v9M16.24 7.76a6 6 0 11-8.48 0" /> </svg> );
        const ExternalLinkIcon = ({className}) => (<svg className={className || "w-4 h-4"} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>);
        const RefreshCwIcon = ({className}) => (<svg className={className || "w-4 h-4"} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>);
        const MoreVerticalIcon = ({className}) => (<svg className={className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>);
        const DownloadIcon = ({className}) => (<svg className={className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>);
        const UploadIcon = ({className}) => (<svg className={className || "w-5 h-5"} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>);

        // --- MOCK DATA ---
        const mockSupportData = [
            { id: 5522, code: 'T-001', type: 'Mobiliario Urbano Impreso - Otros', name: 'Soporte 001 Valla - Concepción 2', minPrice: '$ 1.806.483', monthlyPrice: '$ 2.000.000', comuna: 'Vitacura' },
            { id: 5523, code: 'T-002', type: 'Valla', name: 'Soporte 002 Valla - Renca', minPrice: '$ 1.800.000', monthlyPrice: '$ 2.000.000', comuna: 'Renca' },
            { id: 5524, code: 'T-003', type: 'Caminero', name: 'Soporte 003 Caminero - Tiltil', minPrice: '$ 1.700.000', monthlyPrice: '$ 2.000.000', comuna: 'Tiltil' },
        ];

        const mockCampaignsData = [
            { id: 'CA-6181', title: 'Nombre de la campaña', client: 'Banco BCI', executive: 'Cristián Petit-Bon', nextDeadline: '01/07/2025', status: 'Atrasada' },
            { id: 'CA-6607', title: 'Test 28/04', client: 'Almac', executive: 'Andrés Vilches', nextDeadline: '11/04/2026', status: 'Atrasada' },
            { id: 'CA-6599', title: 'Prueba', client: 'Asus Chile', executive: 'Ejecutivo', nextDeadline: '11/04/2026', status: 'Atrasada' },
            { id: 'CA-6472', title: 'Reserva P3', client: 'Apple', executive: 'Andrés Vilches', nextDeadline: '11/04/2026', status: 'Atrasada' },
            { id: 'CA-6592', title: 'Pruebita', client: 'Anunciante de prueba', executive: 'Francesca Salgado', nextDeadline: '25/02/2026', status: 'Atrasada' },
            { id: 'CA-6578', title: 'Demo periodo mas de un año', client: 'Almac', executive: 'Ignacio Rodríguez', nextDeadline: '29/07/2028', status: 'Pendiente' },
            { id: 'CA-6564', title: 'Prueba error API', client: 'Asus Chile', executive: 'Francisco', nextDeadline: '12/07/2026', status: 'Pendiente' },
        ];
        
        const SuccessChip = ({ message, show }) => {
            if (!show) return null;
            return (
                <div className="fixed bottom-6 right-6 z-50 bg-gray-800 text-white py-2.5 px-5 rounded-lg shadow-xl flex items-center animate-fade-in-out">
                    <CheckIcon />
                    <span className="ml-2 font-medium text-sm">{message}</span>
                </div>
            );
        };
        
        // --- FORM COMPONENTS ---
        const FormInput = ({ label, id, helpText, children, labelClass, wrapperClass, ...props }) => (
            <div className={wrapperClass}>
                {label && (
                    <label htmlFor={id} className={`flex items-center text-sm font-medium text-gray-700 mb-1 ${labelClass}`}>
                        <span>{label}</span>
                        {helpText && <span className="ml-1 text-gray-400 cursor-help" title={helpText}><HelpIcon className="h-4 w-4" /></span>}
                    </label>
                )}
                <div className="filter-container">
                    {children ? children : <input id={id} {...props} className="w-full h-[34px] px-3 py-1.5 text-sm bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" />}
                </div>
            </div>
        );

        const FormSelect = ({ label, id, children, helpText, labelClass, wrapperClass, ...props }) => (
             <div className={wrapperClass}>
                {label && (
                    <label htmlFor={id} className={`flex items-center text-sm font-medium text-gray-700 mb-1 ${labelClass}`}>
                       <span>{label}</span>{helpText && helpText}
                    </label>
                )}
                <div className="filter-container">
                    <select id={id} {...props} className={props.className || "w-full pl-3 pr-10 py-1.5 text-sm border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 rounded-md h-[34px]"}>
                        {children}
                    </select>
                </div>
            </div>
        );
        
        const NavItem = ({ icon, children, href = "#", active = false, hasSubmenu = false, open = false, onClick }) => {
            const linkClasses = `flex items-center p-3 my-1 rounded-md transition-colors duration-200 cursor-pointer ${ active ? 'bg-slate-700 text-white' : 'text-gray-300 hover:bg-slate-700 hover:text-white'}`;
            return ( <li> <a href={href} className={linkClasses} onClick={onClick}> {icon} <span className="mx-4 font-medium">{children}</span> {hasSubmenu && <ChevronDownIcon className={`ml-auto h-5 w-5 transition-transform duration-300 ${open ? 'rotate-180' : ''}`} />} </a> </li> );
        };

        const SubMenu = ({ children, open }) => ( <div className={`overflow-hidden transition-all duration-300 ease-in-out ${open ? 'max-h-screen' : 'max-h-0'}`}> <ul className="pl-8 py-1">{children}</ul> </div> );
        const SubMenuItem = ({ children, href="#", active = false, onClick }) => ( <li> <a href={href} onClick={onClick} className={`block p-2 text-sm rounded-md cursor-pointer ${ active ? 'text-white font-semibold' : 'text-gray-400 hover:bg-slate-700 hover:text-white'}`}> {children} </a> </li> );

        const MainSidebar = ({ onNavigate, currentView, isOutdoorLinkEnabled }) => {
            const [openMenu, setOpenMenu] = useState('soportes');
            const toggleMenu = (menu) => setOpenMenu(openMenu === menu ? null : menu);
            
            return (
                <aside className="hidden md:flex flex-col w-64 bg-slate-800 text-white overflow-y-auto shrink-0">
                    <div className="flex items-center justify-between h-16 px-6 bg-slate-900">
                        <span className="text-2xl font-semibold">OOH</span>
                        <button className="text-gray-300 hover:text-white"> <MenuIcon /> </button>
                    </div>
                    <nav className="flex-1 px-4 py-4">
                        <p className="px-3 text-xs uppercase text-gray-400 tracking-wider">Menú</p>
                        <ul>
                            <NavItem active={currentView === 'home'} icon={<HomeIcon className="h-5 w-5"/>} onClick={(e) => { e.preventDefault(); onNavigate('home'); }}>Inicio</NavItem>
                            <NavItem icon={<WidgetsIcon className="h-5 w-5"/>} hasSubmenu open={openMenu === 'soportes'} onClick={(e) => { e.preventDefault(); toggleMenu('soportes'); }}>Soportes</NavItem>
                            <SubMenu open={openMenu === 'soportes'}>
                                <SubMenuItem active={currentView === 'catalog' || currentView === 'edit'} onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }}>Catálogo</SubMenuItem>
                            </SubMenu>
                            <NavItem active={currentView === 'campaigns' || currentView === 'campaign-detail'} icon={<AssignmentCheckIcon className="h-5 w-5"/>} onClick={(e) => { e.preventDefault(); onNavigate('campaigns'); }}>Campañas</NavItem>
                            <NavItem icon={<CogIcon className="h-5 w-5" />} hasSubmenu open={openMenu === 'admin'} onClick={(e) => { e.preventDefault(); toggleMenu('admin'); }}>Admin</NavItem>
                            <SubMenu open={openMenu === 'admin'}>
                                <SubMenuItem active={currentView === 'company'} onClick={(e) => { e.preventDefault(); onNavigate('company'); }}>Empresa</SubMenuItem>
                            </SubMenu>
                        </ul>
                    </nav>
                </aside>
            );
        };
        
        const Header = ({ view, support, campaign, onNavigate }) => {
            return (
                <header className="flex items-center justify-between h-16 px-6 bg-white border-b border-gray-200 shrink-0">
                    <div className="flex items-center">
                        <div className="flex items-center text-sm text-gray-500">
                            <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('home'); }} className="hover:text-gray-700"><HomeIcon className="h-5 w-5"/></a>
                            <ChevronRightIcon className="h-5 w-5 mx-1" />
                            {view === 'home' && <span className="font-medium text-gray-800">Inicio</span>}
                            {view === 'catalog' && <><span className="hover:text-gray-700">Soportes</span><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">Catálogo</span></>}
                            {view === 'company' && <><span className="hover:text-gray-700">Admin</span><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">Empresa</span></>}
                            {view === 'edit' && <><span className="hover:text-gray-700">Soportes</span><ChevronRightIcon className="h-5 w-5 mx-1" /><a href="#" onClick={(e) => { e.preventDefault(); onNavigate('catalog'); }} className="hover:text-gray-700">Catálogo</a><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">Editar Soporte {support?.code}</span></>}
                            {view === 'campaigns' && <span className="font-medium text-gray-800">Campañas</span>}
                            {view === 'campaign-detail' && <><a href="#" onClick={(e) => { e.preventDefault(); onNavigate('campaigns'); }} className="hover:text-gray-700">Campañas</a><ChevronRightIcon className="h-5 w-5 mx-1" /><span className="font-medium text-gray-800">{campaign?.id}</span></>}
                        </div>
                    </div>
                </header>
            );
        };

        // --- HOME VIEW ---
        const HomeView = ({ campaigns, onSelectCampaign, isOutdoorLinkEnabled }) => {
            const [campaignsList, setCampaignsList] = useState(campaigns);
            
            const countAtrasadas = campaignsList.filter(c => c.status === 'Atrasada').length;
            const countPendientes = campaignsList.filter(c => c.status === 'Pendiente').length;
            const countEnProceso = 12; 
            const countTotal = 68;

            return (
                <div className="space-y-6">
                    {/* Header with Selectors */}
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h1 className="text-2xl font-semibold text-gray-900">Inicio</h1>
                        <div className="flex flex-wrap items-center gap-3">
                            <FormSelect id="filter-anunciante" className="w-40 py-1.5 text-sm border-gray-300 rounded-md h-[34px]">
                                <option>Todos los anunciantes</option>
                            </FormSelect>
                            <FormSelect id="filter-ejecutivo" className="w-40 py-1.5 text-sm border-gray-300 rounded-md h-[34px]">
                                <option>Todos los ejecutivos</option>
                            </FormSelect>
                            <FormSelect id="filter-estado" className="w-40 py-1.5 text-sm border-gray-300 rounded-md h-[34px]">
                                <option>Todos los estados</option>
                            </FormSelect>
                        </div>
                    </div>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

                                                            setLocalEnergyAdminEnabled(newState);
                                                        }} />
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="px-6 py-4 border-t border-gray-200 flex justify-end">
                                        <button type="submit" className="px-5 py-2.5 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 shadow-sm">Guardar cambios</button>
                                    </div>
                               </div>
                               </>
                           )}
                           
                           {activeTab === 'section-energy-admin' && isEnergyAdminEnabled && (
                               <div id="section-energy-admin" className="space-y-6">
                                   <div className="flex space-x-2 border-b border-gray-200 overflow-x-auto pb-[1px]">
                                       {energyProviders.map((provider, index) => (
                                           <button
                                               key={provider.id}
                                               type="button"
                                               onClick={() => setActiveEnergyTab(index)}
                                               className={`px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 transition-colors whitespace-nowrap ${activeEnergyTab === index ? 'border-indigo-600 text-indigo-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 bg-gray-50'}`}
                                           >
                                               {provider.type}
                                           </button>
                                       ))}
                                       <button
                                           type="button"
                                           onClick={() => setActiveEnergyTab('add')}
                                           className={`px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 transition-colors flex items-center whitespace-nowrap ${activeEnergyTab === 'add' ? 'border-indigo-600 text-indigo-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 bg-gray-50'}`}
                                       >
                                           <span className="text-lg leading-none mr-1">+</span> Añadir Proveedor
                                       </button>
                                   </div>

                                   {activeEnergyTab === 'add' ? (
                                       <div className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                            <div className="p-4 border-b">
                                                <h2 className="text-lg font-semibold text-gray-800">Selección de Proveedor</h2>
                                            </div>
                                            <div className="p-6 flex flex-col md:flex-row items-end gap-4">
                                                 <div className="flex-1">
                                                     <label className="block text-sm font-medium text-gray-700 mb-1">Proveedor de administración de energía</label>
                                                     <select
                                                         className="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                                                         value={newProviderType}
                                                         onChange={(e) => setNewProviderType(e.target.value)}
                                                     >
                                                         <option value="Outdoor Link">Outdoor Link</option>
                                                         <option value="Relay Machine">Relay Machine</option>
                                                     </select>
                                                 </div>
                                                 <div>
                                                     <button type="button" onClick={handleAddProvider} className="px-6 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors h-[38px] flex items-center justify-center">
                                                         Guardar
                                                     </button>
                                                 </div>
                                            </div>
                                       </div>
                                   ) : (
                                       <div className="space-y-6">
                                            <div className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                                <div className="p-4 border-b">
                                                    <h2 className="text-lg font-semibold text-gray-800">Credenciales {energyProviders[activeEnergyTab].type}</h2>
                                                </div>
                                                <div className="p-6">
                                                    <div className="flex flex-col md:flex-row items-end gap-4">
                                                        <div className="flex-1">
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                                                            <input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm" placeholder="Ej: api_user" value={energyProviders[activeEnergyTab].apiUser} onChange={(e) => updateProvider(activeEnergyTab, { apiUser: e.target.value })} />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                                                            <input type="password" className="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm" placeholder="••••••••••••" value={energyProviders[activeEnergyTab].apiKey} onChange={(e) => updateProvider(activeEnergyTab, { apiKey: e.target.value })} />
                                                        </div>
                                                        <div className="flex items-center gap-3 w-full md:w-auto">
                                                            <button type="button" onClick={() => handleSaveCredentials(activeEnergyTab)} className="px-6 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors h-[38px] flex items-center justify-center">
                                                                Guardar
                                                            </button>
                                                            {energyProviders[activeEnergyTab].isConnecting && (
                                                                <svg className="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                                </svg>
                                                            )}
                                                            {energyProviders[activeEnergyTab].isCredentialsSaved && !energyProviders[activeEnergyTab].isConnecting && (
                                                                <CheckIcon className="h-6 w-6 text-[#05a069]" />
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                                <div className="p-4 border-b">
                                                    <h2 className="text-lg font-semibold text-gray-800">Opciones de integración</h2>
                                                </div>
                                                <div className="p-6">
                                                    <div className="flex items-center justify-start space-x-4">
                                                        <label htmlFor={`switch_sync_${activeEnergyTab}`} className="flex items-center cursor-pointer">
                                                            <div className="relative">
                                                                <input type="checkbox" id={`switch_sync_${activeEnergyTab}`} className="sr-only" checked={energyProviders[activeEnergyTab].isAutoSyncEnabled} onChange={() => updateProvider(activeEnergyTab, { isAutoSyncEnabled: !energyProviders[activeEnergyTab].isAutoSyncEnabled })} />
                                                                <div className={`block w-10 h-6 rounded-full transition-colors ${energyProviders[activeEnergyTab].isAutoSyncEnabled ? 'bg-indigo-600' : 'bg-gray-200'}`}></div>
                                                                <div className={`dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${energyProviders[activeEnergyTab].isAutoSyncEnabled ? 'translate-x-full' : ''}`}></div>
                                                            </div>
                                                        </label>
                                                        <span className="text-sm text-gray-700 font-medium">Sincronizar campañas automáticamente con {energyProviders[activeEnergyTab].type}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-white border border-blue-200 rounded-lg shadow-sm">
                                                <div className="p-4 border-b flex justify-between items-center">
                                                    <h2 className="text-lg font-semibold text-gray-800">Sincronización</h2>
                                                </div>
                                                <div className="p-6">
                                                    <div className="mb-6">
                                                        <button type="button" onClick={() => handleSyncNow(activeEnergyTab)} disabled={!energyProviders[activeEnergyTab].isCredentialsSaved} className={`px-5 py-2.5 rounded-md text-sm font-medium shadow-sm transition-all focus:outline-none ${!energyProviders[activeEnergyTab].isCredentialsSaved ? 'bg-gray-50 text-gray-400 border border-gray-200 opacity-60 cursor-not-allowed' : 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50'}`}>
                                                            Sincronizar
                                                        </button>
                                                    </div>
                                                    
                                                    {energyProviders[activeEnergyTab].syncHistory && (
                                                        <div className="bg-gray-50 rounded-lg border border-gray-200 overflow-hidden animate-fade-in p-4">
                                                            <div className="flex items-center text-[#05a069] mb-4">
                                                                <CheckIcon className="w-5 h-5 mr-2" />
                                                                <span className="text-sm font-medium">Última sincronización exitosa: {energyProviders[activeEnergyTab].syncHistory.timestamp}</span>
                                                            </div>
                                                            <div className="overflow-x-auto">
                                                                <table className="w-full text-left text-xs bg-white rounded shadow-sm border border-gray-200 overflow-hidden">
                                                                    <thead className="bg-gray-100 text-gray-500">
                                                                        <tr>
                                                                            <th className="px-4 py-2 font-semibold border-b border-gray-200">Soporte</th>
                                                                            <th className="px-4 py-2 font-semibold border-b border-gray-200">Tipo</th>
                                                                            <th className="px-4 py-2 font-semibold text-center border-b border-gray-200">Relés cargados</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody className="divide-y divide-gray-100 text-gray-700">
                                                                        {energyProviders[activeEnergyTab].syncHistory.items.map((item, idx) => (
                                                                            <tr key={idx} className="hover:bg-gray-50">
                                                                                <td className="px-4 py-2 font-medium">{item.support}</td>
                                                                                <td className="px-4 py-2">{item.type}</td>
                                                                                <td className="px-4 py-2 text-center">{item.relays}</td>
                                                                            </tr>
                                                                        ))}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                       </div>
                                   )}
                               </div>
                           )}
                           
                        </form>
                    </div>
                    <SuccessChip message="¡Cambios guardados con éxito!" show={showSuccessChip} />
                 </div>
             );
        };
        
        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedSupport, setSelectedSupport] = useState(null);
            const [selectedCampaign, setSelectedCampaign] = useState(null);
            const [isEnergyAdminEnabled, setIsEnergyAdminEnabled] = useState(false);
            const [energyProviders, setEnergyProviders] = useState([]);
            const [globalProviders, setGlobalProviders] = useState(['Proveedor A', 'Proveedor B', 'Proveedor C']);
            
            const outdoorLinkProvider = energyProviders.find(p => p.type === 'Outdoor Link');
            const isOLConfigEnabled = isEnergyAdminEnabled && energyProviders.length > 0;
            const isOutdoorLinkFullyConfigured = isEnergyAdminEnabled && outdoorLinkProvider && outdoorLinkProvider.isCredentialsSaved && outdoorLinkProvider.syncHistory !== null;
            const isAutoSyncEnabled = outdoorLinkProvider ? outdoorLinkProvider.isAutoSyncEnabled : false;

            const handleNavigate = (newView) => {
                setView(newView);
                if (newView !== 'edit') { setSelectedSupport(null); }
                if (newView !== 'campaign-detail') { setSelectedCampaign(null); }
            };
            
            const handleEdit = (support) => { setSelectedSupport(support); setView('edit'); };
            const handleSelectCampaign = (campaign) => { setSelectedCampaign(campaign); setView('campaign-detail'); };

            const renderContent = () => {
                switch(view) {
                    case 'home': return <HomeView campaigns={mockCampaignsData} onSelectCampaign={handleSelectCampaign} isOutdoorLinkEnabled={isOutdoorLinkFullyConfigured} />;
                    case 'catalog': return <CatalogView onEdit={handleEdit} isOutdoorLinkEnabled={isOutdoorLinkFullyConfigured} providers={globalProviders} />;
                    case 'edit': return <EditSupportView support={selectedSupport} isOutdoorLinkEnabled={isOutdoorLinkFullyConfigured} providers={globalProviders} setProviders={setGlobalProviders} />;
                    case 'company': return <CompanyView 
                                                isEnergyAdminEnabled={isEnergyAdminEnabled} 
                                                setIsEnergyAdminEnabled={setIsEnergyAdminEnabled}
                                                energyProviders={energyProviders}
                                                setEnergyProviders={setEnergyProviders}
                                             />;
                    case 'campaigns': return <CampaignsListView onSelectCampaign={handleSelectCampaign} />;
                    case 'campaign-detail': return <CampaignDetailView campaign={selectedCampaign} onNavigate={handleNavigate} isOutdoorLinkEnabled={isOutdoorLinkFullyConfigured} isAutoSyncEnabled={isAutoSyncEnabled} />;
                    default: return <CatalogView onEdit={handleEdit} isOutdoorLinkEnabled={isOutdoorLinkFullyConfigured} providers={globalProviders} />;
                }
            };

            return (
                <div className="flex h-screen bg-gray-100 font-sans">
                    <MainSidebar onNavigate={handleNavigate} currentView={view} isOutdoorLinkEnabled={isOLConfigEnabled} />
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <Header view={view} support={selectedSupport} campaign={selectedCampaign} onNavigate={handleNavigate} />
                        <main className="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                           {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
